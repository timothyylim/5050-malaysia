<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }} - A directory of women experts{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <link rel="icon" href="/assets/favicon-32.png">
  <link rel="stylesheet" href="/assets/site.css">
  <script>
    // Resolve theme before first paint so there's no flash and the toggle icon
    // matches. Uses a stored choice if present, otherwise the OS setting.
    (function () {
      var stored = null;
      try { stored = localStorage.getItem('theme'); } catch (e) {}
      var theme = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
    function toggleTheme() {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
    }
    // Mobile nav dropdown: toggle the panel and keep aria-expanded in sync.
    function toggleMenu(btn) {
      var menu = document.getElementById('nav-menu');
      if (!menu) return;
      var open = menu.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
    function closeMenu() {
      var menu = document.getElementById('nav-menu');
      var btn = document.getElementById('nav-toggle');
      if (menu) menu.classList.remove('open');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }
    // Close on link click (delegated) and on Escape.
    document.addEventListener('click', function (e) {
      if (e.target.closest && e.target.closest('#nav-menu a')) closeMenu();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeMenu();
    });
  </script>
</head>
<body>
  <div class="wrap">
    {{ partial "nav.html" . }}
  </div>
  {{ block "main" . }}{{ end }}
  {{ partial "footer.html" . }}
</body>
</html>
