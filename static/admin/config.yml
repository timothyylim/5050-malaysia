backend:
  name: github
  repo: timothyylim/5050-malaysia
  branch: main
  base_url: https://5050malaysia.com
  auth_endpoint: /admin/oauth/auth

site_url: https://5050malaysia.com
display_url: https://5050malaysia.com
logo_url: /assets/logo.svg
show_preview_links: true
local_backend: true
publish_mode: simple
media_folder: static/uploads
public_folder: /uploads

collections:
  - name: profiles
    label: Experts
    label_singular: Expert
    folder: content/profiles
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - {label: Name, name: title, widget: string, required: true, hint: "The expert's full name."}
      - {label: Public URL slug, name: slug, widget: string, required: true, hint: "Lowercase URL slug, e.g. siti-aminah. Leave unchanged when editing an existing profile."}
      - label: Industries
        name: industries
        widget: relation
        collection: industries
        search_fields: [title]
        display_fields: [title]
        value_field: "{{slug}}"
        multiple: true
        required: true
      - {label: "Role & Organisation", name: role, widget: string, required: false}
      - {label: Specialisation, name: specialisation, widget: text, required: false}
      - {label: Email, name: email, widget: string, required: false}
      - {label: Phone, name: phone, widget: string, required: false}
      - {label: Hide from public directory, name: draft, widget: boolean, default: false, required: false, hint: "Leave off for a normal published profile. Turn on only while preparing a profile."}
      - {label: Internal notes, name: body, widget: markdown, required: false, hint: "Optional notes for the directory team. This field is not displayed on the public profile."}

  - name: industries
    label: Industries
    label_singular: Industry
    folder: content/industries
    create: true
    slug: "{{slug}}"
    filter: {field: layout, value: industry}
    fields:
      - {label: Name, name: title, widget: string, required: true}
      - {label: Public URL slug, name: slug, widget: string, required: true, hint: "Lowercase URL slug, e.g. human-rights. Leave unchanged when editing an existing industry."}
      - {label: Layout, name: layout, widget: hidden, default: industry}
      - {label: Description, name: description, widget: text, required: false}

  - name: pages
    label: Pages
    files:
      - label: About
        name: about
        file: content/about.md
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Description, name: description, widget: text, required: false}
          - {label: Body, name: body, widget: markdown}
          - label: Founders
            name: founders
            widget: list
            fields:
              - {label: Name, name: name, widget: string}
              - {label: Bio, name: bio, widget: text}
              - {label: Social, name: social, widget: string, required: false}
      - label: FAQs
        name: faq
        file: content/faq.md
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Description, name: description, widget: text, required: false}
          - label: Questions
            name: faqs
            widget: list
            fields:
              - {label: Question, name: question, widget: string}
              - {label: Answer, name: answer, widget: markdown}
