# Self-hosted Ghost (open source) + MySQL. Portable to any server with Docker.
# Bind Ghost to localhost only; put Caddy (or nginx) in front for TLS.
#
#   docker compose up -d
#   docker compose logs -f ghost
#
# First run creates the site; then visit https://YOURDOMAIN/ghost to set up admin.
services:
  ghost:
    image: ghost:5-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:2368:2368"        # localhost only — Caddy terminates TLS
    environment:
      url: https://5050malaysia.com  # <-- set to the real domain (or staging URL)
      database__client: mysql
      database__connection__host: db
      database__connection__user: ghost
      database__connection__password: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      database__connection__database: ghost
      # --- Mail (required for staff invites / member emails). Fill from a provider ---
      # mail__transport: SMTP
      # mail__options__host: smtp.mailgun.org
      # mail__options__port: 587
      # mail__options__auth__user: postmaster@YOURDOMAIN
      # mail__options__auth__pass: ${MAIL_PASSWORD}
      NODE_ENV: production
    volumes:
      - ghost_content:/var/lib/ghost/content
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - ghost_db:/var/lib/mysql

volumes:
  ghost_content:
  ghost_db:
