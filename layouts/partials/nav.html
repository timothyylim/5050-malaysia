{{ $current := .RelPermalink }}
<nav class="site">
  <a class="logo" href="/"><img src="/assets/logo.svg" alt="50-50 Malaysia"></a>
  <div class="nav-links">
    <a href="/#browse"{{ if .IsHome }} class="active"{{ end }}>Browse experts</a>
    <a href="/industries/"{{ if hasPrefix $current "/industries/" }} class="active"{{ end }}>Industries</a>
    <a href="/about/"{{ if eq $current "/about/" }} class="active"{{ end }}>About</a>
    <a href="/faq/"{{ if eq $current "/faq/" }} class="active"{{ end }}>FAQs</a>
    <a class="btn" href="{{ site.Params.signupFormURL }}" target="_blank" rel="noopener">Join the database</a>
    <button class="theme-toggle" type="button" aria-label="Toggle light and dark mode" title="Toggle light/dark" onclick="toggleTheme()">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</nav>
